# https://taskfile.dev

version: '3'

tasks:
  install:
    desc: Install ArgoCD into the mgmt cluster via kustomize and print the initial admin password.
    cmds:
      - kubectl config set-context kind-{{.cluster_mgmt}}
      - cmd: kubectl create ns argocd
        ignore_error: true
      - kubectl apply -k . --server-side --force-conflicts
      - task: wait-for-secret
      - task: get-password

  port-forward:
    desc: Port-forward the ArgoCD server UI to localhost:8080.
    cmds:
      - kubectl port-forward svc/argocd-server -n argocd 8080:443

  wait-for-secret:
    cmds:
      - cmd: |
          echo "Waiting for argocd-initial-admin-secret to be created..."
          until kubectl get secret argocd-initial-admin-secret -n argocd >/dev/null 2>&1; do
            sleep 2
          done
        silent: true

  get-password:
    desc: Print the ArgoCD initial admin password.
    vars:
      ARGO_PASS:
        sh: kubectl get secret argocd-initial-admin-secret -n argocd -o jsonpath='{.data.password}' | base64 -d
    cmds:
      - cmd: echo -e "\n===> ArgoCD initial admin password is {{.ARGO_PASS}}\n"
        silent: true