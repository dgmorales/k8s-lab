# https://taskfile.dev

version: '3'

vars:
  namespace: cluster-api
  cilium_chart_version: 1.19.5

tasks:

  init:
    env:
      CLUSTER_TOPOLOGY: true
    cmds:
      - clusterctl init --infrastructure docker --wait-providers

  create-clusters:
    cmds:
    - kubectl --context kind-{{ .cluster_mgmt }} create ns {{ .namespace }} || true
    - kubectl --context kind-{{ .cluster_mgmt }} apply -n {{ .namespace }} -f clusterclass-quick-start.yaml
    - kubectl --context kind-{{ .cluster_mgmt }} apply -n {{ .namespace }} -f cilium-cni-configmap.yaml
    - kubectl --context kind-{{ .cluster_mgmt }} apply -n {{ .namespace }} -f cilium-clusterresourceset.yaml
    - kubectl --context kind-{{ .cluster_mgmt }} apply -n {{ .namespace }} -f {{ .cluster_dev }}.yaml
    - kubectl --context kind-{{ .cluster_mgmt }} apply -n {{ .namespace }} -f {{ .cluster_prod0 }}.yaml
    - kubectl --context kind-{{ .cluster_mgmt }} apply -n {{ .namespace }} -f {{ .cluster_prod1 }}.yaml
    - task: wait-clusters
    - task: get-kubeconfigs
    - task: register-argocd-clusters

  render-cilium-manifest:
    # Regenerates cilium-cni-configmap.yaml from the cilium/cilium helm chart. Run this after
    # bumping cilium_chart_version. ipam.operator.clusterPoolIPv4PodCIDRList must match the
    # pods.cidrBlocks used by the Cluster manifests (lab-dev-0.yaml etc). kubeProxyReplacement
    # is left at its default (false) since the KubeadmControlPlaneTemplate doesn't skip
    # kube-proxy.
    cmds:
    - helm repo add cilium https://helm.cilium.io/ || true
    - helm repo update cilium
    - cmd: |
        set -e
        helm template cilium cilium/cilium --version {{ .cilium_chart_version }} --namespace kube-system \
          --set ipam.operator.clusterPoolIPv4PodCIDRList='{192.168.0.0/16}' \
          > /tmp/cilium-rendered.yaml
        {
          echo "apiVersion: v1"
          echo "kind: ConfigMap"
          echo "metadata:"
          echo "  name: cilium-cni"
          echo "  namespace: {{ .namespace }}"
          echo "data:"
          echo "  cilium.yaml: |"
          sed 's/^/    /' /tmp/cilium-rendered.yaml
        } > cilium-cni-configmap.yaml
        rm /tmp/cilium-rendered.yaml

  wait-clusters:
    cmds:
    - kubectl --context kind-{{ .cluster_mgmt }} wait -n {{ .namespace }} --for=condition=ControlPlaneInitialized --timeout=10m cluster/{{ .cluster_dev }}
    - kubectl --context kind-{{ .cluster_mgmt }} wait -n {{ .namespace }} --for=condition=ControlPlaneInitialized --timeout=10m cluster/{{ .cluster_prod0 }}
    - kubectl --context kind-{{ .cluster_mgmt }} wait -n {{ .namespace }} --for=condition=ControlPlaneInitialized --timeout=10m cluster/{{ .cluster_prod1 }}

  get-kubeconfigs:
    cmds:
    - clusterctl --kubeconfig-context kind-{{ .cluster_mgmt }} get kubeconfig {{ .cluster_dev }} --namespace {{ .namespace }} > kubeconfigs/{{ .cluster_dev }}.kubeconfig
    - clusterctl --kubeconfig-context kind-{{ .cluster_mgmt }} get kubeconfig {{ .cluster_prod0 }} --namespace {{ .namespace }} > kubeconfigs/{{ .cluster_prod0 }}.kubeconfig
    - clusterctl --kubeconfig-context kind-{{ .cluster_mgmt }} get kubeconfig {{ .cluster_prod1 }} --namespace {{ .namespace }} > kubeconfigs/{{ .cluster_prod1 }}.kubeconfig

  local-kubeconfig:
    # Builds host-usable copies of each workload cluster's kubeconfig, for inspecting them
    # directly (kubectl, k9s, etc) from the host. The ones from get-kubeconfigs use internal
    # docker-network addresses (see register-argocd-clusters for why those aren't reachable
    # from the host); this swaps in the load balancer container's host-published port instead,
    # then merges all 3 into one kubeconfig with a context per cluster.
    #
    # Re-run this whenever the LB containers are recreated (e.g. cluster recreated), since
    # their host ports are randomly assigned each time.
    cmds:
    - cmd: |
        set -e
        for c in {{ .cluster_dev }} {{ .cluster_prod0 }} {{ .cluster_prod1 }}; do
          cp kubeconfigs/$c.kubeconfig kubeconfigs/external-$c.kubeconfig
          port=$(docker port $c-lb 6443/tcp | head -1 | cut -d: -f2)
          kubectl --kubeconfig kubeconfigs/external-$c.kubeconfig config set-cluster $c --server=https://127.0.0.1:$port
        done
        KUBECONFIG=kubeconfigs/external-{{ .cluster_dev }}.kubeconfig:kubeconfigs/external-{{ .cluster_prod0 }}.kubeconfig:kubeconfigs/external-{{ .cluster_prod1 }}.kubeconfig \
          kubectl config view --flatten > kubeconfigs/lab-clusters.kubeconfig

  register-argocd-clusters:
    vars:
      argocd_image: quay.io/argoproj/argocd:v3.5.0-rc2
    # Registers each workload cluster with the ArgoCD running on the mgmt cluster, so
    # ApplicationSets using the `clusters` generator (e.g. apps/appsets/guestbook.yaml)
    # pick them up automatically.
    #
    # The CAPD workload clusters' API servers are only reachable via internal docker-network
    # addresses (Docker Desktop isolates the host from the "kind" bridge network, so the
    # argocd CLI can't reach them directly from the host). So this runs the registration from
    # a throwaway container attached to the "kind" docker network instead, using an internal
    # kubeconfig for the mgmt cluster (kind ... --internal, i.e. its docker DNS name) rather
    # than the host-published port.
    cmds:
    - cmd: |
        set -e
        kind get kubeconfig --name {{ .cluster_mgmt }} --internal > kubeconfigs/{{ .cluster_mgmt }}-internal.kubeconfig
        kubectl --kubeconfig kubeconfigs/{{ .cluster_mgmt }}-internal.kubeconfig config set-context --current --namespace=argocd
        docker run --rm --network kind \
          -v "$(pwd)/kubeconfigs:/kubeconfigs:ro" \
          -e KUBECONFIG=/kubeconfigs/{{ .cluster_mgmt }}-internal.kubeconfig \
          --entrypoint sh \
          {{ .argocd_image }} \
          -c '
            set -ex
            argocd login --core
            argocd cluster add {{ .cluster_dev }}-admin@{{ .cluster_dev }} --kubeconfig /kubeconfigs/{{ .cluster_dev }}.kubeconfig --name {{ .cluster_dev }} --label type=worker --upsert --yes
            argocd cluster add {{ .cluster_prod0 }}-admin@{{ .cluster_prod0 }} --kubeconfig /kubeconfigs/{{ .cluster_prod0 }}.kubeconfig --name {{ .cluster_prod0 }} --label type=worker --upsert --yes
            argocd cluster add {{ .cluster_prod1 }}-admin@{{ .cluster_prod1 }} --kubeconfig /kubeconfigs/{{ .cluster_prod1 }}.kubeconfig --name {{ .cluster_prod1 }} --label type=worker --upsert --yes
            argocd cluster set in-cluster --label type=mgmt
          '
